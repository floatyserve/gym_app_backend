version: '3.8'

services:
  db:
    image: postgres:15
    container_name: gym_app_db
    environment:
      POSTGRES_DB: gym_app_db
      POSTGRES_USER: gym_admin
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gym_admin -d gym_app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gym_app_backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/gym_app_db
      - SPRING_DATASOURCE_USERNAME=gym_admin
      - SPRING_DATASOURCE_PASSWORD=secretpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

volumes:
  postgres_data: